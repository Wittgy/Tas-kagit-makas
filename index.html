<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taş Kağıt Makas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <p class="title">Taş Kağıt Makas</p>
  <p class="subtitle">Bilgisayara karşı klasik mücadele</p>

  <div class="score-card">
    <div class="score-item"><div class="score-label">Kazanç</div><div class="score-value win" id="score-win">0</div></div>
    <div class="score-item"><div class="score-label">Kayıp</div><div class="score-value lose" id="score-lose">0</div></div>
    <div class="score-item"><div class="score-label">Beraberlik</div><div class="score-value draw" id="score-draw">0</div></div>
  </div>

  <div class="buton-container">
    <button onclick="playGame('Taş')" class="move-button"><img src="rock-35522_640.png" class="move-icon"></button>
    <button onclick="playGame('Kağıt')" class="move-button"><img src="scroll-34696_640.png" class="move-icon"></button>
    <button onclick="playGame('Makas')" class="move-button"><img src="scissors-806238_640.png" class="move-icon"></button>
  </div>

  <p class="js-result result"></p>
  <p class="js-score"></p>

  <div class="button-row">
    <button onclick="score.kazanc=0;score.kayip=0;score.berabere=0;localStorage.setItem('score',JSON.stringify(score));updateText();alert('Skorlar Sıfırlandı!')" class="btn btn-danger">Sıfırla</button>
    <button id="playButton" onclick="togglePlay()" class="btn btn-primary">Oynat</button>
  </div>

  <button id="toggleButton">☀</button>
</div>

<script>
  let score = JSON.parse(localStorage.getItem('score')) || { kazanc: 0, kayip: 0, beraberlik: 0 };

  function updateScoreDisplay() {
    document.getElementById('score-win').textContent = score.kazanc;
    document.getElementById('score-lose').textContent = score.kayip;
    document.getElementById('score-draw').textContent = score.berabere;
  }

  updateText();

  function playGame(playerMove) {
    const computerMove = pickcomputerMove();
    let result = '';

    if (playerMove === 'Taş') {
      if (computerMove === 'Taş') { result = 'Bilgisayarın seçimi: Taş. <br><br>Beraberlik! :/'; score.berabere++; }
      else if (computerMove === 'Kağıt') { result = 'Bilgisayarın seçimi: Kağıt. <br><br>Kaybettin! :('; score.kayip++; }
      else if (computerMove === 'Makas') { result = 'Bilgisayarın seçimi: Makas. <br><br>Tebrikler, kazandın! :D'; score.kazanc++; }
    } else if (playerMove === 'Kağıt') {
      if (computerMove === 'Taş') { result = 'Bilgisayarın seçimi: Taş. <br><br>Tebrikler, kazandın! :D'; score.kazanc++; }
      else if (computerMove === 'Kağıt') { result = 'Bilgisayarın seçimi: Kağıt. <br><br>Beraberlik :/'; score.berabere++; }
      else if (computerMove === 'Makas') { result = 'Bilgisayarın seçimi: Makas. <br><br>Maalesef kaybettin! :('; score.kayip++; }
    } else if (playerMove === 'Makas') {
      if (computerMove === 'Taş') { result = 'Bilgisayarın seçimi: Taş. <br><br>Maalesef kaybettin! :('; score.kayip++; }
      else if (computerMove === 'Kağıt') { result = 'Bilgisayarın seçimi: Kağıt. <br><br>Tebrikler, kazandın! :D'; score.kazanc++; }
      else if (computerMove === 'Makas') { result = 'Bilgisayarın seçimi: Makas. <br><br>Beraberlik :/'; score.berabere++; }
    }

    localStorage.setItem('score', JSON.stringify(score));
    updateText();

    document.querySelector('.js-result').innerHTML = result;
    document.querySelector('.js-moves').innerHTML = `Seçimin: ${playerMove} - ${result}`;
  }

  function updateText() {
    document.querySelector('.js-score').innerHTML = `Kazanç: ${score.kazanc}\nKayıp: ${score.kayip}\nBeraberlik: ${score.berabere}`;
    updateScoreDisplay();
  }

  function pickcomputerMove() {
    const randomNumber = Math.random();
    let computerMove = '';
    if (randomNumber >= 0 && randomNumber < 1 / 3) { computerMove = 'Taş'; }
    else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) { computerMove = 'Kağıt'; }
    else { computerMove = 'Makas'; }
    return computerMove;
  }

  const toggleButton = document.getElementById('toggleButton');
  toggleButton.addEventListener('click', function() {
    const body = document.body;
    const currentClass = body.classList.contains('is-toggled');
    if (currentClass) {
      body.classList.remove('is-toggled');
      toggleButton.textContent = '☀';
      body.style.backgroundColor = '';
      body.style.color = '';
      toggleButton.style.backgroundColor = '';
      toggleButton.style.color = '';
    } else {
      body.classList.add('is-toggled');
      toggleButton.textContent = '🌙';
      body.style.backgroundColor = 'gray';
      body.style.color = 'black';
      toggleButton.style.backgroundColor = 'black';
      toggleButton.style.color = 'white';
    }
  });

  let timerId;

  function togglePlay() {
    const playButton = document.getElementById('playButton');
    if (timerId) {
      clearInterval(timerId);
      timerId = null;
      playButton.textContent = 'Oynat';
    } else {
      timerId = setInterval(playGameAutomatically, 1000);
      playButton.textContent = 'Durdur';
    }
  }

  function playGameAutomatically() {
    const moves = ['Taş', 'Kağıt', 'Makas'];
    const randomMove = moves[Math.floor(Math.random() * moves.length)];
    playGame(randomMove);
  }
</script>
</body>
</html>
